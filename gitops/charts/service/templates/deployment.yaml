apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paas-service.name" . }}
  labels:
    {{- include "paas-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "paas-service.name" . }}
  template:
    metadata:
      labels:
        {{- include "paas-service.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ include "paas-service.name" . }}
          image: {{ required "image is required" .Values.image | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          {{- if or .Values.env .Values.config .Values.existingSecret }}
          envFrom:
            {{- if .Values.env }}
            - configMapRef:
                name: {{ include "paas-service.name" . }}-env
            {{- end }}
            {{- if .Values.config }}
            - configMapRef:
                name: {{ include "paas-service.name" . }}
            {{- end }}
            {{- if .Values.existingSecret }}
            - secretRef:
                name: {{ .Values.existingSecret }}
            {{- end }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- if .Values.env }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "paas-service.name" . }}-env
  labels:
    {{- include "paas-service.labels" . | nindent 4 }}
data:
  {{- toYaml .Values.env | nindent 2 }}
{{- end }}
