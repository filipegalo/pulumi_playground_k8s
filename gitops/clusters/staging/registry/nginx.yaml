{
  "apiVersion": "argoproj.io/v1alpha1",
  "kind": "Application",
  "metadata": {
    "name": "nginx-staging",
    "namespace": "argocd",
    "labels": {
      "app.kubernetes.io/part-of": "registry"
    },
    "finalizers": [
      "resources-finalizer.argocd.argoproj.io"
    ]
  },
  "spec": {
    "project": "default",
    "source": {
      "repoURL": "https://github.com/filipegalo/pulumi_playground_k8s.git",
      "targetRevision": "master",
      "path": "gitops/charts/service",
      "helm": {
        "releaseName": "nginx",
        "values": "{\n  \"image\": \"nginx:1.27-alpine\",\n  \"replicas\": 2,\n  \"containerPort\": 80,\n  \"env\": {\n    \"APP_ENV\": \"staging\"\n  },\n  \"config\": {},\n  \"service\": {\n    \"enabled\": true,\n    \"type\": \"ClusterIP\",\n    \"ports\": [\n      {\n        \"name\": \"http\",\n        \"port\": 80,\n        \"targetPort\": 80\n      }\n    ]\n  },\n  \"ingress\": {\n    \"enabled\": false,\n    \"host\": \"nginx.staging.localhost\",\n    \"className\": null,\n    \"path\": \"/\",\n    \"pathType\": \"Prefix\",\n    \"servicePort\": 80,\n    \"annotations\": {}\n  },\n  \"readinessProbe\": {\n    \"enabled\": true,\n    \"path\": \"/\",\n    \"initialDelaySeconds\": 3,\n    \"periodSeconds\": 5\n  },\n  \"resources\": {\n    \"requests\": {\n      \"cpu\": \"50m\",\n      \"memory\": \"64Mi\"\n    },\n    \"limits\": {\n      \"cpu\": \"250m\",\n      \"memory\": \"256Mi\"\n    }\n  },\n  \"networkPolicy\": {\n    \"enabled\": true,\n    \"spec\": {\n      \"podSelector\": {\n        \"matchLabels\": {\n          \"app.kubernetes.io/name\": \"nginx\",\n          \"app.kubernetes.io/part-of\": \"pulumi-lab\"\n        }\n      },\n      \"ingress\": [],\n      \"policyTypes\": [\n        \"Ingress\"\n      ]\n    }\n  },\n  \"existingSecret\": \"nginx\"\n}"
      }
    },
    "destination": {
      "namespace": "nginx",
      "name": "staging"
    },
    "syncPolicy": {
      "automated": {
        "prune": true,
        "selfHeal": true
      },
      "syncOptions": [
        "CreateNamespace=true"
      ]
    }
  }
}
