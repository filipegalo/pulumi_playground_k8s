name: Logic Tests

on:
  pull_request:
    paths-ignore:
      - "services/**"
  push:
    branches:
      - main
    paths-ignore:
      - "services/**"

jobs:
  tests:
    name: Pulumi mock tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Sync dependencies
        run: uv sync

      - name: Compile
        run: make compile

      - name: Test with 100 percent coverage
        run: make coverage
